# Model-risk file — Claude Opus 4.7 (one million-token context)
#
# Generated as the concrete companion to .ctoc/model-risk/_template.yaml
# for the model CTOC currently uses by default in this project.
# Unverified values are marked with [unverified] per CLAUDE.md
# ("no invented numbers; cite sources"). They are NOT filled in with
# estimates; the user fills them in when the underlying citation is
# available.

model_id: anthropic-claude-opus-4-7
model_display_name: "Claude Opus 4.7 (one million-token context)"

