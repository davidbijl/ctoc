# ===============================================================================
#  CTOC SaaS Template Index (v8.3)
#  Opinionated starter templates for autonomous SaaS builds.
#  Each template has a manifest.yaml describing default tech stack,
#  required skills, setup steps, and first-week milestones.
# ===============================================================================

schema_version: 1
last_reviewed: 2026-05-14

templates:

  - id: saas/b2c-subscription
    name: "B2C Subscription SaaS"
    description: "Freemium or paid B2C SaaS with Stripe subscriptions. Default for consumer products."
    target_project_types: [saas-b2c, startup-product]
    path: .ctoc/templates/saas/b2c-subscription/
    status: ready

  # Future templates (sketches — to be built in subsequent passes):

  - id: saas/b2b-sales-led
    name: "B2B Sales-Led SaaS"
    description: "B2B with single-sign-on, audit logs, role-based access control, contracts. Sales-led go-to-market."
    target_project_types: [saas-b2b]
    status: planned
    notes: |
      Differs from b2c-subscription: WorkOS for single-sign-on, organization-scoped data,
      role-based permissions, audit log table, contract-based billing (not self-serve),
      compliance docs (System and Organization Controls 2 templates).

  - id: saas/usage-based-api
    name: "Usage-Based API SaaS"
    description: "Application-programming-interface product with per-request or per-token metering."
    target_project_types: [api-saas]
    status: planned
    notes: |
      Differs: metered billing (Stripe metered prices), application-programming-interface
      keys table, rate limiting, usage dashboard, latency service-level objective.

  - id: app/expo-react-native
    name: "React Native Mobile App"
    description: "Cross-platform iOS plus Android with Expo and Expo Application Services."
    target_project_types: [mobile-app]
    status: planned
    notes: |
      Default stack: Expo software-development-kit 52+, Clerk Expo, Supabase, RevenueCat
      (in-app purchases), Sentry, Expo Application Services Build and Submit.

  - id: cli/bun-single-binary
    name: "Command-Line Tool (Bun, Single Binary)"
    description: "Command-line tool packaged as a single cross-platform binary."
    target_project_types: [cli]
    status: planned

  - id: oss-lib/typescript
    name: "Open-Source TypeScript Library"
    description: "TypeScript library with proper publish plus changesets plus continuous integration."
    target_project_types: [oss-library]
    status: planned

# ===============================================================================
#  How a template is selected
# ===============================================================================
#
#  1. vision-advisor extracts the project type from the user's vision
#  2. stack-chooser (Tier 1) consults this index plus the project type
#  3. CTO Chief presents the matching template and asks the user to confirm
#  4. The template's manifest.yaml dictates the implementation-planner output
#
# ===============================================================================
