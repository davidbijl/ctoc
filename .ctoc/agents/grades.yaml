# Agent Grades
#
# This file tracks the quality scores of all 66 agents after going through
# the Agent-Critic 10-round improvement loop.
#
# Schema:
#   agent-name:
#     score: 0-10 (overall score)
#     status: perfect|accepted_with_notes|needs_attention|bootstrap
#     rounds: number of rounds completed
#     lastUpdated: ISO timestamp
#     history: array of round scores
#
# Scoring System:
#   10    = PERFECT (extremely rare)
#   9     = Excellent, only edge cases remain
#   7-8   = Good quality, still has issues
#   5-6   = Functional but weak, needs improvement
#   3-4   = Major gaps, significant rework needed
#   0-2   = Fundamentally broken, must rewrite
#
# Status Values:
#   perfect           - Achieved score 10
#   accepted_with_notes - Score >= 8, accepted with documented issues
#   needs_attention   - Score < 8, requires further work
#   bootstrap         - Initial version, not yet critiqued
#   pending           - Queued for improvement loop
#
# Example:
#   security-scanner:
#     score: 9.2
#     status: accepted_with_notes
#     rounds: 7
#     lastUpdated: "2025-02-02T12:00:00Z"
#     history:
#       - round: 1
#         overall: 5.4
#         issues: 12
#       - round: 2
#         overall: 6.8
#         issues: 8
#       - round: 7
#         overall: 9.2
#         issues: 1

