name: do-178c-level-a
display_name: "RTCA DO-178C Level A airborne software"
description: "Highest design assurance level for airborne software where anomalous behaviour would cause catastrophic failure conditions."
authoritative_sources:
  - title: "Verification of airborne software DO-178C — LDRA"
    url: "https://ldra.com/wp-content/uploads/ldra/DO-178C_WhitePaper_v3.0.pdf"
  - title: "Requirements Traceability Matrix for DO-178C — Parasoft"
    url: "https://www.parasoft.com/learning-center/do-178c/requirements-traceability/"
effective_date: "2011-12-13"
applies_to: "Airborne software whose failure or anomalous behaviour would prevent continued safe flight and landing"
required_controls:
  - fmeda_design
  - fault_tree_analysis
  - requirements_traceability_matrix
  - hil_test_ladder
  - wcet_budget
  - independent_verification_validation
  - config_baseline
  - tool_qualification
  - defect_density_target
  - graceful_degradation_matrix
  - audit_hash_chain
  - retention_schedule
  - capa_register
  - process_fmea_loop
retention:
  dispatches: 3650
  baselines: 7300
  security_incident: 3650
notes: |
  Level A requires Modified Condition Decision Coverage at 100 percent. Bidirectional
  traceability from high-level requirements through low-level requirements to source
  code and test cases is mandatory. Independence between developer and verifier is
  required. Tool qualification per DO-330. Configuration management per DO-178C
  section 7 with frozen baselines.
