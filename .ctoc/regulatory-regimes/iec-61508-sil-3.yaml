name: iec-61508-sil-3
display_name: "IEC 61508 Safety Integrity Level 3"
description: "Industrial functional safety level. Applicable to process automation, machinery, and other industrial control systems where failure would have severe consequences."
authoritative_sources:
  - title: "ORS Consulting bridging IEC 61511 and IEC 62443"
    url: "https://www.ors-consulting.com/industrial-cybersecurity-and-process-safety-bridging-iec-61511-and-iec-62443"
effective_date: "2010-04-30"
applies_to: "Safety-related electrical, electronic, and programmable electronic systems in industrial settings"
required_controls:
  - fmeda_design
  - fault_tree_analysis
  - process_fmea_loop
  - requirements_traceability_matrix
  - hil_test_ladder
  - independent_verification_validation
  - config_baseline
  - tool_qualification
  - defect_density_target
  - graceful_degradation_matrix
  - audit_hash_chain
  - retention_schedule
  - capa_register
  - eight_d_incident_template
retention:
  dispatches: 3650
  baselines: 5475
  security_incident: 3650
notes: |
  Safety Integrity Level 3 demands probability of dangerous failure per hour between
  ten to the minus seven and ten to the minus eight. Pair with IEC 62443 for
  industrial control system cybersecurity. Diverse redundancy patterns may be needed
  depending on the hazard analysis.
