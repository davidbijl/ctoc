# ═══════════════════════════════════════════════════════════════════════════════
#  CTOC Settings v1.4.0
#  Project-level configuration for CTOC
#
#  This YAML file is read by the safety-critical PreToolUse hooks and library
#  code (enforcement.mode, regulatory_regime, operations) — kept flat and
#  dependency-free so hooks parse it without a YAML library. The menu-driven
#  store (runtime environment, agents, workflow, git, privacy, deployment) lives
#  in .ctoc/settings.json. See docs/CONFIG_SOURCES.md for what goes where.
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
#  General Settings
# ─────────────────────────────────────────────────────────────────────────────

timezone: "UTC"

# ─────────────────────────────────────────────────────────────────────────────
#  Regulatory Regime Profiles (v6.9.27 — multi-industry critique response)
#  Opt-in profiles that activate industry-grade controls (audit hash-chaining,
#  four-eyes principle, traceability matrix, retention schedule, hardware-in-
#  the-loop testing, incident-reporting clocks, etc.).
#
#  Default profile is `none` — CTOC stays lean. List one or more regimes
#  per project; controls are union-merged (any regime requiring a control
#  activates it).
#
#  Per-profile catalog at: .ctoc/regulatory-regimes/<profile>.yaml
#  Library: src/lib/regulatory-regime.js
#  Documentation: docs/REGULATORY_REGIMES.md
# ─────────────────────────────────────────────────────────────────────────────

regulatory_regime:
  # Profiles to activate. Default empty list = `none` (lean, opt-in nothing).
  # Available profiles (stack multiple if the project is multi-regime):
  #   - pci-dss-v4        (payment card industry, mandatory March 2025)
  #   - sox-itgc          (Sarbanes-Oxley Section 404 IT general controls)
  #   - dora              (EU Digital Operational Resilience Act, applicable Jan 2025)
  #   - finra             (Financial Industry Regulatory Authority broker-dealer)
  #   - hipaa             (Health Insurance Portability and Accountability Act)
  #   - iso-26262-asil-d  (automotive functional safety highest level)
  #   - do-178c-level-a   (airborne software, catastrophic-failure-condition level)
  #   - iec-62304-class-c (medical device software, life-threatening class)
  #   - iec-61508-sil-3   (industrial functional safety integrity level 3)
  #   - eu-cra            (EU Cyber Resilience Act, effective 11 Sep 2026)
  #   - eu-ai-act-high-risk (EU Artificial Intelligence Act Annex III high-risk systems)
  #   - iso-9001          (Quality management systems)
  #   - nydfs-500         (New York Department of Financial Services 23 NYCRR 500)
  #   - mifid-ii          (Markets in Financial Instruments Directive II, sub-100-microsecond clock)
  active_profiles: []

  # Override individual controls regardless of profile (use sparingly).
  # Setting a control to `true` activates it; `false` forces it off.
  overrides: {}

# ─────────────────────────────────────────────────────────────────────────────
#  Operations Configuration (NEW in v1.4.0)
# ─────────────────────────────────────────────────────────────────────────────

operations:
  # Model configuration
  default_model: "claude-opus-4-5-20251101"
  provider: "anthropic"
  api_key_env: "ANTHROPIC_API_KEY"

  # Model tiering - quality first, not cost first
  model_tiers:
    complex: "opus"      # Deep reasoning, creativity, architecture
    moderate: "sonnet"   # Pattern matching, analysis
    simple: "haiku"      # Cached operations only

  # Model selection strategy
  model_selection:
    strategy: quality_first

    # Per-agent defaults
    defaults:
      understand: opus
      plan-advisor: opus
      project-setup: opus
      git-advisor: sonnet
      issue-processor: sonnet
      progress-insights: sonnet

    # Dynamic selection based on context
    dynamic:
      enabled: true
      rules:
        - if: "codebase_size > 100_files"
          then: "prefer_opus"
        - if: "operation_is_cached"
          then: "haiku_sufficient"
        - if: "self_improvement_triggered"
          then: "require_opus"

    # Fallback chain for availability issues
    fallback_chain: [opus, sonnet, haiku]

  # Self-improvement settings
  self_improvement:
    enabled: true
    critique_loops: 5              # Number of self-critique iterations
    learn_always: true             # Every run can improve
    rate_limit: "5/hour"           # Max improvements per hour
    log_learning: true             # Keep audit trail

  # Caching settings
  caching:
    enabled: true
    structure_ttl: "24h"           # File structure cache
    insights_ttl: "1h"             # Understanding cache
    auto_invalidate: true          # Watch for file changes
    cache_dir: ".local/cache"

  # Privacy settings
  privacy:
    gitignore_cache: true          # Add cache/ to .gitignore
    redact_secrets_in_logs: true   # Don't log detected secrets

  # Performance settings
  performance:
    max_parallel_agents: 3         # Concurrent agent limit
    token_budget_per_operation: 50000
    timeout: "60s"

  # Cost visibility (optional)
  cost_visibility:
    enabled: true
    show_estimates: true           # Before expensive ops
    warn_threshold: 10000          # Tokens
    track_usage: true              # Running total

# ─────────────────────────────────────────────────────────────────────────────
#  Iron Loop Enforcement
# ─────────────────────────────────────────────────────────────────────────────

enforcement:
  # Mode: strict (block), soft (warn), off (disabled)
  mode: strict

  # Files that bypass enforcement (config, docs, etc.)
  # These can be edited without going through Iron Loop planning
  whitelist:
    - "*.md"               # Documentation
    - "*.yaml"             # Configuration
    - "*.yml"              # Configuration
    - "*.json"             # Configuration (package.json, etc.)
    - "*.toml"             # Configuration (pyproject.toml, etc.)
    - ".gitignore"         # Git config
    - ".env*"              # Environment files
    - ".ctoc/**"           # CTOC internal files
    - ".local/**"          # Local state files

  # Escape phrases that bypass enforcement
  escape_phrases:
    - "skip planning"
    - "quick fix"
    - "trivial fix"
    - "hotfix"

# ─────────────────────────────────────────────────────────────────────────────
#  Learning Configuration
# ─────────────────────────────────────────────────────────────────────────────

learning:
  # CTO-gated learning propagation
  cross_agent_learning:
    mode: cto_gated
    gatekeeper: cto-chief

    review_timing:
      high_confidence: immediate   # >0.9 confidence → instant
      normal: daily_batch          # Accumulated learnings
      on_demand: true              # User can trigger review

    appeals:
      allowed: true
      method: resubmit_with_evidence
      max_attempts: 3

    cto_criteria:
      generalizability: 0.7
      confidence: 0.85
      consistency_check: true
      safety_check: true

  # Learning publishing
  publishing:
    auto_publish:
      enabled: true
      criteria:
        - cto_approved: true
        - confidence: ">0.9"
        - generalizability: ">0.8"
        - novel: true
      format: github_issue
      repo: "robotijn/ctoc"
      label: "community-learning"

    manual_publish:
      enabled: true
      command: "ctoc learning publish <learning-id>"

# ─────────────────────────────────────────────────────────────────────────────
#  Research Configuration
# ─────────────────────────────────────────────────────────────────────────────

research:
  enabled: true
  auto_research_steps: [1, 5, 7]   # ASSESS, DESIGN, TEST
  websearch: true

# ─────────────────────────────────────────────────────────────────────────────
#  Git Workflow Configuration
# ─────────────────────────────────────────────────────────────────────────────

git:
  co_author: "Claude Opus 4.5 <noreply@anthropic.com>"
  auto_sync: true
  force_with_lease: true           # Safe force push

# ─────────────────────────────────────────────────────────────────────────────
#  User Preferences (learned from interactions)
# ─────────────────────────────────────────────────────────────────────────────

user_preferences:
  # These are learned automatically from user behavior
  # Format similar to Claude Code's /memory
  commit_style: null               # Learned: conventional, descriptive, brief
  approval_preferences: null       # Learned: quick, thorough, ask_always
  working_patterns: null           # Learned: sequential, parallel, exploratory

  # Keyboard layout for input selectors
  # latin: Use letters (A-Z) and numbers (1-7)
  # numeric-only: Use only numbers
  keyboard_layout: "latin"

# ─────────────────────────────────────────────────────────────────────────────
#  Deployment Pipeline Configuration
# ─────────────────────────────────────────────────────────────────────────────

deployment:
  # Master switch for deployment pipeline
  # When enabled, Gate 3 approval (review -> done) triggers automated deployment
  enabled: false

  # Environment definitions — pipeline runs in order, skipping disabled envs
  # Strategies: git-branch, git-tag, webhook, script, docker, ssh
  environments:
    - name: development
      enabled: false
      strategy: git-branch       # Push to deploy/development branch
      branch: deploy/development

    - name: staging
      enabled: false
      strategy: git-branch       # Push to deploy/staging branch
      branch: deploy/staging

    - name: production
      enabled: false
      strategy: git-branch       # Push to deploy/production branch
      branch: deploy/production

  # Approval requirements per environment
  # auto: deploy immediately after previous env succeeds
  # manual: pause and ask user before deploying
  approval:
    staging: auto
    production: manual           # Recommended: always require human approval for prod

  # Webhook notifications
  notifications:
    on_success: []               # URLs to POST on successful deployment
    on_failure: []               # URLs to POST on failed deployment

  # Rollback configuration
  rollback:
    auto_rollback: true          # Automatically rollback on failure
    keep_history: 10             # Number of deployment records to keep
